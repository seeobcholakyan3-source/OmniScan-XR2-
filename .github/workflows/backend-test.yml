name: Backend CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: omniscan-backend

    steps:
      # --------------------------------------------------
      # 1. Checkout repo
      # --------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # --------------------------------------------------
      # 2. Setup Python
      # --------------------------------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # --------------------------------------------------
      # 3. Upgrade pip
      # --------------------------------------------------
      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      # --------------------------------------------------
      # 4. Install dependencies (FIXED PATH)
      # --------------------------------------------------
      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "❌ requirements.txt not found in omniscan-backend"
            exit 1
          fi

      # --------------------------------------------------
      # 5. Syntax validation (safe compile check)
      # --------------------------------------------------
      - name: Python syntax check
        run: |
          python -m compileall .

      # --------------------------------------------------
      # 6. Start backend server
      # --------------------------------------------------
      - name: Start backend
        run: |
          python OmniOrchestrator.py &
          sleep 6

      # --------------------------------------------------
      # 7. Health check (CI validation)
      # --------------------------------------------------
      - name: Health check
        run: |
          curl --fail http://127.0.0.1:5000/health || exit 1

      # --------------------------------------------------
      # 8. Scan endpoint test (optional but useful)
      # --------------------------------------------------
      - name: Scan endpoint test
        run: |
          curl --fail http://127.0.0.1:5000/scan/34.05/-118.24 || exit 1

      # --------------------------------------------------
      # 9. Success
      # --------------------------------------------------
      - name: CI Success
        run: echo "✅ Backend pipeline passed"
