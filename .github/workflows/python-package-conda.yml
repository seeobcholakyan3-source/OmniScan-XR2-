on: [push]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 5

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # --- DEBUG STEP: This will print all files in your repo to the Action logs ---
    - name: Check files in repo
      run: |
        echo "Listing all files in the root directory:"
        ls -la
        echo "Listing all files recursively to find environment.yml:"
        find . -name "env*.y*ml"
    # -----------------------------------------------------------------------------

    - name: Set up Python 3.10
      uses: actions/setup-python@v5 # Updated to v5 to fix Node.js deprecation warning
      with:
        python-version: '3.10'
        
    - name: Add conda to system path
      run: |
        echo $CONDA/bin >> $GITHUB_PATH
        
    - name: Install dependencies
      run: |
        # If your file is in a folder, change this to: --file folder_name/environment.yml
        conda env update --file environment.yml --name base
        
    - name: Lint with flake8
      run: |
        conda install flake8
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        
    - name: Test with pytest
      run: |
        conda install pytest
        pytest
