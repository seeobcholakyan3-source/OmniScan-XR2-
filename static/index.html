<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <img id="earth" src="https://upload.wikimedia.org/wikipedia/commons/8/83/Equirectangular_projection_SW.jpg">
      </a-assets>

      <a-sky color="#020205"></a-sky>
      
      <a-entity id="globe-container" position="0 1.5 -4">
        <a-sphere id="earth-model" radius="1.2" src="#earth" animation="property: rotation; to: 0 360 0; loop: true; dur: 60000; easing: linear"></a-sphere>
        </a-entity>

      <a-text id="console" value="Fetching NASA Cloud Data..." position="0 3.2 -4" align="center" color="#00ffcc" width="4"></a-text>
      
      <a-entity camera look-controls position="0 1.6 0"></a-entity>
    </a-scene>

    <script>
      async function updateVRData() {
        const res = await fetch('/api/satellite-data');
        const json = await res.json();
        
        if (json.status === "Live") {
          document.querySelector('#console').setAttribute('value', `NASA Online: ${json.data.length} Granules Found`);
          
          const globe = document.querySelector('#globe-container');
          json.data.forEach(granule => {
            // Logic to convert Lat/Long to 3D Sphere Coordinates
            const pin = document.createElement('a-sphere');
            pin.setAttribute('radius', '0.05');
            pin.setAttribute('color', '#ff0000');
            // Simplified positioning: this puts it on the surface of the radius 1.2 globe
            pin.setAttribute('position', '0 1.2 0'); 
            globe.appendChild(pin);
          });
        }
      }
      setInterval(updateVRData, 10000); // Update every 10 seconds
    </script>
  </body>
</html>
